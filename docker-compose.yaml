services:
  zyphir-pg:
    image: postgres
    ports:
      - 5434:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - zyphir_network

  zyphir-redis:
    image: redis
    ports:
      - 6379:6379
    networks:
      - zyphir_network

networks:
  zyphir_network:
    name: zyphir_network
    driver: bridge
